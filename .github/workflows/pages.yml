name: Deploy website to GitHub Pages

# Builds the static picopilot website (./website) and publishes it to GitHub
# Pages. The showcase games are the pre-committed exports under
# website/static/games/ (there is no CI export step: PICO-8 is a paid binary,
# see ADR-0013). Run manually, or on a push that touches the website.
on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Pages needs read on contents + write on pages/id-token.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; don't cancel a running one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build website
        # base_path from configure-pages is the repo subpath (e.g. /picopilot).
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: pnpm --filter ./website build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
